# Local development environment configuration
debug: true
environment: "local"

# Database configuration for local development
database:
  host: "localhost"
  port: 5432
  database: "quantfolio_local"
  username: "postgres"
  password: "password"

# API configuration for local development
api:
  rate_limit_requests_per_minute: 120  # Higher limit for development
  timeout_seconds: 60

# ML configuration for local development
ml:
  pytorch_device: "cpu"
  tensorflow_device: "/CPU:0"
  training_batch_size: 16  # Smaller batch size for local development
  max_epochs: 50  # Fewer epochs for faster development

# MLflow configuration for local development
mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "quantfolio-local-experiments"

# Storage configuration for local development
storage:
  data_root: "./data"
  backup_enabled: false  # Disable backups in local development

# Monitoring configuration for local development
monitoring:
  log_level: "DEBUG"
  metrics_collection_interval: 10  # More frequent collection for development
  enable_distributed_tracing: false  # Disable for simplicity in local dev

# Security configuration for local development
security:
  enable_authentication: false
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"
    - "http://localhost:8080"